```html
<!DOCTYPE html>
<html>
<head>
<title>Click The Dots</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

body{
text-align:center;
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
touch-action:manipulation;
}

#gameArea{
position:relative;
width:90%;
height:60vh;
margin:auto;
border-radius:15px;
background:white;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
display:none;
}

#gameInfo{
font-size:20px;
margin:15px;
}

.dot,.bomb,.gold{
border-radius:50%;
position:absolute;
cursor:pointer;
}

.dot{
background:red;
animation:pulse 1s infinite;
}

.gold{
background:gold;
animation:pulse 0.8s infinite;
}

.bomb{
background:black;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:8px;
}

input{
padding:8px;
font-size:16px;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<h1>Click The Dots</h1>

<div id="startScreen">
<p>Enter Your Name:</p>
<input type="text" id="playerName" maxlength="15">
<br><br>
<button onclick="startGame()">Start Game</button>
</div>

<div id="gameInfo" style="display:none;">
Score: <span id="score">0</span> |
Time: <span id="time">30</span>
</div>

<div id="gameArea"></div>

<script>

let score = 0
let timeLeft = 30
let player = ""
let timer
let moveInterval
let combo = 0
let lastClick = 0

const gameArea = document.getElementById("gameArea")

const popSound = new Audio("https://www.myinstants.com/media/sounds/pop.mp3")
const boomSound = new Audio("https://www.myinstants.com/media/sounds/explosion.mp3")
const goldSound = new Audio("https://www.myinstants.com/media/sounds/coin.mp3")

function startGame(){

player = document.getElementById("playerName").value.trim()

if(!player){
alert("Enter your name!")
return
}

score = 0
timeLeft = 30

document.getElementById("score").textContent = score
document.getElementById("time").textContent = timeLeft

document.getElementById("startScreen").style.display="none"
document.getElementById("gameInfo").style.display="block"
gameArea.style.display="block"

createObjects()

moveInterval = setInterval(moveObjects,800)

timer = setInterval(()=>{

timeLeft--
document.getElementById("time").textContent = timeLeft

if(timeLeft % 5 === 0){
createObjects()
}

if(timeLeft <=0){
clearInterval(timer)
clearInterval(moveInterval)
endGame()
}

},1000)

}

function randomPosition(element){

const maxX = gameArea.clientWidth - element.offsetWidth
const maxY = gameArea.clientHeight - element.offsetHeight

element.style.left = Math.random()*maxX+"px"
element.style.top = Math.random()*maxY+"px"

}

function moveObjects(){

document.querySelectorAll(".dot,.bomb,.gold").forEach(obj=>{
randomPosition(obj)
})

}

function createObjects(){

gameArea.innerHTML=""

for(let i=0;i<3;i++){

const dot = document.createElement("div")
dot.classList.add("dot")

const size = 40 + Math.random()*40
dot.style.width=size+"px"
dot.style.height=size+"px"

randomPosition(dot)

dot.addEventListener("pointerdown",()=>{

popSound.currentTime=0
popSound.play()

let now = Date.now()

if(now-lastClick<500){
combo++
}else{
combo=1
}

score += combo
lastClick = now

document.getElementById("score").textContent=score

randomPosition(dot)

})

gameArea.appendChild(dot)

}

const bomb = document.createElement("div")

bomb.classList.add("bomb")
bomb.style.width="60px"
bomb.style.height="60px"

randomPosition(bomb)

bomb.addEventListener("pointerdown",()=>{

boomSound.currentTime=0
boomSound.play()

score--
score=Math.max(0,score)

document.getElementById("score").textContent=score

document.body.style.transform="translateX(10px)"
setTimeout(()=>{document.body.style.transform="translateX(-10px)"},50)
setTimeout(()=>{document.body.style.transform="translateX(0)"},100)

randomPosition(bomb)

})

gameArea.appendChild(bomb)

if(Math.random()<0.4){

const gold = document.createElement("div")

gold.classList.add("gold")
gold.style.width="50px"
gold.style.height="50px"

randomPosition(gold)

gold.addEventListener("pointerdown",()=>{

goldSound.currentTime=0
goldSound.play()

score+=5

document.getElementById("score").textContent=score

gold.remove()

})

gameArea.appendChild(gold)

}

}

function endGame(){

gameArea.innerHTML=""

let best = localStorage.getItem("bestScore") || 0

if(score > best){
best = score
localStorage.setItem("bestScore",score)
}

const result = document.createElement("div")

result.innerHTML=`
<h2>Game Over</h2>
<p>${player}, your score is <b>${score}</b></p>
<p>🏆 Best Score: ${best}</p>
<br>
<button onclick="location.reload()">Play Again</button>
`

document.body.appendChild(result)

}

</script>

</body>
</html>
```
