<!DOCTYPE html>
<html>
<head>
    <title>Click The Dots</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f2f2f2;
            touch-action: manipulation;
        }

        #gameArea {
            position: relative;
            width: 100%;
            height: 60vh;
            border: 2px solid black;
            overflow: hidden;
            display: none;
            margin-top: 20px;
        }

        .dot, .bomb {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            position: absolute;
        }

        .dot { background: red; }
        .bomb { background: black; }

        button { padding: 10px 20px; font-size: 16px; }
        input { padding: 8px; font-size: 16px; }
    </style>
</head>
<body>

<h1>Click The Dots</h1>

<div id="startScreen">
    <p>Enter Your Name:</p>
    <input type="text" id="playerName">
    <br><br>
    <button onclick="startGame()">Start Game</button>
</div>

<div id="gameInfo" style="display:none;">
    Score: <span id="score">0</span> |
    Time: <span id="time">30</span>
</div>

<div id="gameArea"></div>

<div id="leaderboard"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTDDHiEWJUb1qOhRvlvwXxiuB4bNNilfc",
  authDomain: "click-game-378e6.firebaseapp.com",
  databaseURL: "https://click-game-378e6-default-rtdb.firebaseio.com/",
  projectId: "click-game-378e6",
  storageBucket: "click-game-378e6.firebasestorage.app",
  messagingSenderId: "623900789347",
  appId: "1:623900789347:web:df31174faafc600ee28656",
  measurementId: "G-24QE68D1WX"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

let score = 0;
let timeLeft = 30;
let player = "";
let timer;

const gameArea = document.getElementById("gameArea");

window.startGame = function() {
    player = document.getElementById("playerName").value;
    if (player.trim() === "") {
        alert("Enter name!");
        return;
    }

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameInfo").style.display = "block";
    gameArea.style.display = "block";

    createObjects();
    moveObjects();

    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("time").textContent = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timer);
            endGame();
        }
    }, 1000);
}

function createObjects() {
    gameArea.innerHTML = "";

    for (let i = 0; i < 3; i++) {
        let dot = document.createElement("div");
        dot.classList.add("dot");

        dot.addEventListener("pointerdown", () => {
            score++;
            document.getElementById("score").textContent = score;
            moveObjects();
        });

        gameArea.appendChild(dot);
    }

    let bomb = document.createElement("div");
    bomb.classList.add("bomb");

    bomb.addEventListener("pointerdown", () => {
        score--;
        document.getElementById("score").textContent = score;
        moveObjects();
    });

    gameArea.appendChild(bomb);
}

function moveObjects() {
    const objects = document.querySelectorAll(".dot, .bomb");

    objects.forEach(obj => {
        const maxX = gameArea.clientWidth - 70;
        const maxY = gameArea.clientHeight - 70;

        obj.style.left = Math.random() * maxX + "px";
        obj.style.top = Math.random() * maxY + "px";
    });
}

function endGame() {
    saveScore();
    showLeaderboard();
    gameArea.innerHTML = "";
}

function saveScore() {
    push(ref(database, "scores"), {
        name: player,
        score: score
    });
}

function showLeaderboard() {
    get(ref(database, "scores")).then(snapshot => {
        let scores = [];

        snapshot.forEach(child => {
            scores.push(child.val());
        });

        scores.sort((a,b) => b.score - a.score);
        scores = scores.slice(0,5);

        let html = "<h2>🏆 Global Leaderboard</h2>";

        scores.forEach((entry,index) => {
            html += `<p>${index+1}. ${entry.name} - ${entry.score}</p>`;
        });

        html += '<br><button onclick="location.reload()">Play Again</button>';

        document.getElementById("leaderboard").innerHTML = html;
    });
}
</script>

</body>
</html>
