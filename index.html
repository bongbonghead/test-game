<!DOCTYPE html>
<html>
<head>
<title>Click The Dots</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

body{
    text-align:center;
    font-family:Arial;
    background:#f2f2f2;
    touch-action:manipulation;
}

#gameArea{
    position:relative;
    width:100%;
    height:60vh;
    border:2px solid black;
    overflow:hidden;
    display:none;
    margin-top:20px;
}

.dot,.bomb{
    width:70px;
    height:70px;
    border-radius:50%;
    position:absolute;
}

.dot{
    background:red;
}

.bomb{
    background:black;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

input{
    padding:8px;
    font-size:16px;
}

</style>
</head>

<body>

<h1>Click The Dots</h1>

<div id="startScreen">
<p>Enter Your Name:</p>
<input type="text" id="playerName" maxlength="15">
<br><br>
<button onclick="startGame()">Start Game</button>
</div>

<div id="gameInfo" style="display:none;">
Score: <span id="score">0</span> |
Time: <span id="time">30</span>
</div>

<div id="gameArea"></div>

<script>

let score = 0;
let timeLeft = 30;
let player = "";
let timer;

const gameArea = document.getElementById("gameArea");

function startGame(){

    player = document.getElementById("playerName").value.trim();

    if(!player){
        alert("Enter your name!");
        return;
    }

    score = 0;
    timeLeft = 30;

    document.getElementById("score").textContent = score;
    document.getElementById("time").textContent = timeLeft;

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameInfo").style.display = "block";
    gameArea.style.display = "block";

    createObjects();

    timer = setInterval(()=>{

        timeLeft--;
        document.getElementById("time").textContent = timeLeft;

        if(timeLeft <= 0){
            clearInterval(timer);
            endGame();
        }

    },1000);
}

function randomPosition(element){

    const maxX = gameArea.clientWidth - 70;
    const maxY = gameArea.clientHeight - 70;

    element.style.left = Math.random() * maxX + "px";
    element.style.top = Math.random() * maxY + "px";
}

function createObjects(){

    gameArea.innerHTML = "";

    for(let i=0;i<3;i++){

        const dot = document.createElement("div");
        dot.classList.add("dot");

        randomPosition(dot);

        dot.addEventListener("pointerdown",()=>{

            score++;
            document.getElementById("score").textContent = score;

            randomPosition(dot);

            const bomb = document.querySelector(".bomb");
            if(bomb) randomPosition(bomb);

        });

        gameArea.appendChild(dot);
    }

    const bomb = document.createElement("div");

    bomb.classList.add("bomb");

    randomPosition(bomb);

    bomb.addEventListener("pointerdown",()=>{

        score--;
        score = Math.max(0,score);

        document.getElementById("score").textContent = score;

        randomPosition(bomb);

    });

    gameArea.appendChild(bomb);
}

function endGame(){

    gameArea.innerHTML = "";

    const result = document.createElement("div");

    result.innerHTML = `
    <h2>Game Over</h2>
    <p>${player}, your score is <b>${score}</b></p>
    <br>
    <button onclick="location.reload()">Play Again</button>
    `;

    document.body.appendChild(result);
}

</script>

</body>
</html>
